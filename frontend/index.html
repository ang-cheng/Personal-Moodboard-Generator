<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Moodboard Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="composer" aria-labelledby="app-title">
        <div class="brand-row">
          <span class="brand-mark" aria-hidden="true"></span>
          <p>Personal Moodboard Generator</p>
        </div>

        <h1 id="app-title">Describe a mood. Choose a board.</h1>

        <form id="moodboard-form" class="prompt-form">
          <label for="prompt">Mood prompt</label>
          <textarea
            id="prompt"
            name="prompt"
            rows="5"
            minlength="3"
            maxlength="280"
            required
            placeholder="calm quiet morning with gentle light"
          ></textarea>

          <div class="form-actions">
            <button type="submit" id="generate-button">Generate</button>
            <span id="status" role="status" aria-live="polite"></span>
          </div>
        </form>
      </section>

      <section class="workspace" aria-live="polite">
        <nav class="tabs" aria-label="Moodboard views">
          <button type="button" id="generate-tab" class="tab-button active">Generate</button>
          <button type="button" id="gallery-tab" class="tab-button">Gallery</button>
        </nav>

        <div id="empty-state" class="empty-state">
          <span>Waiting for your first prompt</span>
        </div>

        <section id="results-section" class="panel tab-panel hidden" aria-labelledby="results-title">
          <div class="section-heading">
            <div>
              <p class="label">Generated options</p>
              <h2 id="results-title">Moodboards</h2>
            </div>
            <p id="results-meta" class="subtle"></p>
          </div>

          <div id="moodboard-list" class="moodboard-list"></div>
        </section>

        <section id="gallery-section" class="panel tab-panel hidden" aria-labelledby="gallery-title">
          <div class="section-heading">
            <div>
              <p class="label">Saved gallery</p>
              <h2 id="gallery-title">Your picks</h2>
            </div>
            <p id="gallery-count" class="subtle"></p>
          </div>

          <div id="saved-gallery" class="moodboard-list compact"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
